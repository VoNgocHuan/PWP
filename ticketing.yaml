  /events/{event_id}/tickets/:
    get:
      summary: Get all tickets for an event
      operationId: getEventTickets
      tags:
        - Events
        - Tickets
      parameters:
        - $ref: '#/components/parameters/event_id'
      responses:
        '200':
          description: List of tickets for the event
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
              example:
                - id: 1
                  name: "VIP"
                  price: 150.00
                  capacity: 100
                  remaining: 50
                - id: 2
                  name: "General Admission"
                  price: 50.00
                  capacity: 500
                  remaining: 200
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Event not found"
    post:
      summary: Create a ticket for an event
      operationId: createTicket
      tags:
        - Events
        - Tickets
      parameters:
        - $ref: '#/components/parameters/event_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreate'
            example:
              name: "Early Bird"
              price: 75.00
              capacity: 200
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
              example:
                id: 3
                name: "Early Bird"
                price: 75.00
                capacity: 200
                remaining: 200
          headers:
            Location:
              schema:
                type: string
              description: URL of the created ticket
              example: "/api/events/1/tickets/3"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Event not found"
        '409':
          description: Ticket name must be unique per event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Ticket name must be unique per event"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unprocessable Entity"
                message: "Validation failed"

