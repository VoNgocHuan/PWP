components:
  parameters:
    user_id:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the user
      example: 1
    event_id:
      name: event_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the event
      example: 1
    ticket_id:
      name: ticket_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the ticket
      example: 1
    order_id:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the order
      example: 1
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
      description: Maximum number of results to return
      example: 50
    offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Number of results to skip before returning results
      example: 0

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained from /auth/login/. Include in Authorization header
        as "Bearer <token>"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error type
          example: "Bad Request"
        message:
          type: string
          description: Detailed error message
          example: "Invalid request body"

    User:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          description: User's full name (must contain space)
        email:
          type: string
          format: email
          description: User's email address (must be unique)
        password:
          type: string
          format: password
          minLength: 6
          description: User's password
        status:
          type: string
          enum: [active, disabled]
          default: active
          description: User account status

    Event:
      type: object
      required:
        - title
        - venue
        - city
        - starts_at
      properties:
        title:
          type: string
          description: Event title
        venue:
          type: string
          description: Event venue
        city:
          type: string
          description: City where event is held
        description:
          type: string
          description: Event description
        starts_at:
          type: string
          format: date-time
          description: Event start time
        ends_at:
          type: string
          format: date-time
          nullable: true
          description: Event end time (optional)
        status:
          type: string
          enum: [active, cancelled]
          default: active
          description: Event status
        created_at:
          type: string
          format: date-time
          description: Event creation timestamp

    Ticket:
      type: object
      required:
        - name
        - price
        - capacity
      properties:
        name:
          type: string
          description: Ticket type name (e.g., "VIP", "Standard")
        price:
          type: number
          minimum: 0
          description: Ticket price
        capacity:
          type: integer
          minimum: 0
          description: Total ticket capacity

    Order:
      type: object
      required:
        - ticket_id
      properties:
        ticket_id:
          type: integer
          description: ID of the ticket to purchase

x-mediaTypes:
  - mediaType: application/vnd.mason+json
    schema:
      type: object
      properties:
        "@namespaces":
          type: object
          additionalProperties:
            type: object
            properties:
              name:
                type: string
                description: Namespace URL for link relations
        "@controls":
          type: object
          description: Hypermedia controls for navigation and actions
        "@error":
          type: object
          properties:
            "@message":
              type: string
              description: Short error title
            "@messages":
              type: array
              items:
                type: string
              description: Detailed error messages
  
externalDocs:
  description: Link Relations Documentation
  url: /api/link-relations/
