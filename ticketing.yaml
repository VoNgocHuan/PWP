              $ref: '#/components/schemas/EventCreate'
            example:
              title: "Updated Concert Night"
              venue: "New Arena"
              city: "Chicago"
              description: "Updated event description"
              starts_at: "2024-06-20T20:00:00Z"
              ends_at: "2024-06-20T23:00:00Z"
