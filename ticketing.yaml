        '200':
          description: List of all events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: 1
                  title: "Concert Night"
                  venue: "Arena Stadium"
                  city: "New York"
                  description: "An amazing live concert"
                  starts_at: "2024-06-15T19:00:00Z"
                  ends_at: "2024-06-15T23:00:00Z"
                  status: "active"
                - id: 2
                  title: "Tech Conference"
                  venue: "Convention Center"
                  city: "San Francisco"
                  description: "Annual tech conference"
                  starts_at: "2024-07-20T09:00:00Z"
                  ends_at: "2024-07-22T18:00:00Z"
                  status: "active"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Internal Server Error"
                message: "An unexpected error occurred"
    post:
      summary: Create a new event
      operationId: createEvent
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreate'
            example:
              title: "New Concert"
              venue: "Stadium Arena"
              city: "Los Angeles"
              description: "A grand musical event"
              starts_at: "2024-08-01T20:00:00Z"
              ends_at: "2024-08-01T23:30:00Z"
              status: "active"
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: 3
                title: "New Concert"
                venue: "Stadium Arena"
                city: "Los Angeles"
                description: "A grand musical event"
                starts_at: "2024-08-01T20:00:00Z"
                ends_at: "2024-08-01T23:30:00Z"
                status: "active"
          headers:
            Location:
              schema:
                type: string
              description: URL of the created event
              example: "/api/events/3"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unprocessable Entity"
                message: "Validation failed"

