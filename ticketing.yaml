                message: "Order not found"
    put:
      summary: Update an order
      operationId: updateOrder
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/order_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdate'
            example:
              status: "used"
      responses:
        '204':
          description: Order updated
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Order not found"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unprocessable Entity"
                message: "Validation failed"
    delete:
      summary: Delete an order
      operationId: deleteOrder
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/order_id'
      responses:
        '204':
          description: Order deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Order not found"
        '409':
          description: Could not delete order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Could not delete order"

components:
  parameters:
    user_id:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the user
      example: 1
    event_id:
      name: event_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the event
      example: 1
    ticket_id:
      name: ticket_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the ticket
      example: 1
    order_id:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
      description: The unique identifier of the order
      example: 1
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
      description: Maximum number of results to return
      example: 50
    offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Number of results to skip before returning results
      example: 0

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token authentication

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error type
          example: "Bad Request"
        message:
          type: string
          description: Detailed error message
          example: "Invalid request body"

    User:
      type: object
      additionalProperties: false
      required:
        - name
        - email
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          maxLength: 120
          minLength: 1
          pattern: "^[A-Za-z]+\\s[A-Za-z]+.*$"
          description: "Full name in format Firstname Lastname"
          example: "John Doe"
        email:
          type: string
          maxLength: 250
          format: email
          example: "john@example.com"
        status:
          type: string
          enum:
            - active
            - disabled
          default: active
          example: "active"
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-15T10:30:00Z"

    UserCreate:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          description: Must contain first name and last name
          example: "John Doe"
        email:
          type: string
          example: "john@example.com"
        status:
          type: string
          enum:
            - active
            - disabled
          default: active
          example: "active"

    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        title:
          type: string
          example: "Concert Night"
        venue:
          type: string
          example: "Arena Stadium"
        city:
          type: string
          example: "New York"
        description:
          type: string
          example: "An amazing live concert"
        starts_at:
          type: string
          format: date-time
          example: "2024-06-15T19:00:00Z"
        ends_at:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-15T23:00:00Z"
        status:
          type: string
          enum:
            - active
            - cancelled
          example: "active"

    EventCreate:
      type: object
      required:
        - title
        - venue
        - city
        - starts_at
      properties:
        title:
          type: string
          example: "Concert Night"
        venue:
          type: string
          example: "Arena Stadium"
        city:
          type: string
          example: "New York"
        description:
          type: string
          example: "An amazing live concert"
        starts_at:
          type: string
          format: date-time
          example: "2024-06-15T19:00:00Z"
        ends_at:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-15T23:00:00Z"
        status:
          type: string
          enum:
            - active
            - cancelled
          default: active
          example: "active"

    Ticket:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "VIP"
        price:
          type: number
          example: 150.00
        capacity:
          type: integer
          example: 100
        remaining:
          type: integer
          example: 50

    TicketCreate:
      type: object
      required:
        - name
        - price
        - capacity
      properties:
        name:
          type: string
          example: "VIP"
        price:
          type: number
          minimum: 0
          example: 150.00
        capacity:
          type: integer
          minimum: 0
          example: 100

    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        user_id:
          type: integer
          example: 1
        ticket_id:
          type: integer
          example: 5
        status:
          type: string
          enum:
            - used
            - not_used
          example: "not_used"
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2024-01-20T12:00:00Z"

    OrderCreate:
      type: object
      required:
        - user_id
        - ticket_id
      properties:
        user_id:
          type: integer
          example: 1
        ticket_id:
          type: integer
          example: 5

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum:
            - used
            - not_used
          description: The new status of the order
          example: "used"