                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Event not found"
        '409':
          description: Cannot update event with existing orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Cannot update event with existing orders"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unprocessable Entity"
                message: "Validation failed"
    delete:
