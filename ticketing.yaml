openapi: 3.0.4
info:
  title: Ticketing API
  description: |
    API for managing users, events, tickets, and orders
  version: 1.0.0

servers:
  - url: /api
    description: Main API server

paths:
  /:
    get:
      summary: API entry point
      operationId: getEntry
      tags:
        - Entry point
      responses:
        '200':
          description: |
            Successful API response with 
            hypermedia controls
          content:
            application/vnd.mason+json:
              example:
                {
                  "@namespaces": {
                    "ticketing": {
                      "name": "/api/link-relations#"
                    }
                  },
                  "@controls": {
                    "ticketing:users-all": {
                      "href": "/api/users/",
                      "title": "All users"
                    },
                    "ticketing:events-all": {
                      "href": "/api/events/",
                      "title": "All events"
                    },
                    "ticketing:orders": {
                      "href": "/api/orders/",
                      "title": "My orders"
                    },
                    "ticketing:login": {
                      "href": "/api/auth/login/",
                      "method": "POST",
                      "title": "Login"
                    }
                  }
                }

  /auth/login/:
    post:
      summary: User login
      description: |
        Authenticate user and receive JWT token. 
        The token must be included
        in subsequent requests using the 
        Authorization header.
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: User's email address
                password:
                  type: string
                  format: password
                  description: User's password
              example:
                {
                  "email": "alice@example.com",
                  "password": "password123"
                }
      responses:
        '200':
          description: Login successful
          content:
            application/vnd.mason+json:
              example:
                {
                  "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
                  "user_id": 1
                }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '415':
          description: Unsupported media type - JSON required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unsupported Media Type"
                message: "Content-Type must be application/json"

  /auth/logout/:
    post:
      summary: User logout
      description: |
        Logout user by revoking the JWT token. 
        The token is added to a blacklist.
      operationId: logoutUser
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logout successful
        '401':
          description: Unauthorized
          content:
            application/vnd.mason+json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"

  /users/:
    get:
      summary: Get all users
      description: |
        Returns a list of all users. Requires authentication.
        Each user item includes hypermedia controls.
      operationId: getUsers
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of all users
          content:
            application/vnd.mason+json:
              example:
                {
                  "items": [
                    {
                      "id": 1,
                      "name": "Alice Wonderland",
                      "email": "alice@example.com",
                      "status": "active",
                      "created_at": "2026-04-06T09:47:44.351470",
                      "@controls": {
                        "self": {"href": "/api/users/1/"},
                        "profile": {"href": "/api/profiles/user/"}
                      }
                    }
                  ],
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/users/"},
                    "ticketing:add-user": {
                      "href": "/api/users/",
                      "method": "POST",
                      "title": "Register new user",
                      "schema": {
                        "type": "object",
                        "required": ["name", "email", "password"],
                        "properties": {
                          "name": {"type": "string"},
                          "email": {"type": "string"},
                          "password": {"type": "string", "minLength": 6},
                          "status": {"type": "string", "enum": ["active", "disabled"]}
                        }
                      },
                      "encoding": "json"
                    }
                  }
                }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"

    post:
      summary: Create a new user
      operationId: createUser
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
            example:
              name: "John Doe"
              email: "john@example.com"
              password: "securepassword123"
      responses:
        '201':
          description: User created
          headers:
            location:
              description: URL of the created user
              schema:
                type: string
              example: "/api/users/1"
          content:
            application/vnd.mason+json:
              example:
                {
                  "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
                  "user_id": 3
                }
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Email already exists"
        '415':
          description: Unsupported media type - JSON required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unsupported Media Type"
                message: "Content-Type must be application/json"

  /users/{user_id}:
    parameters:
      - $ref: '#/components/parameters/user_id'

    get:
      summary: Get a user by ID
      description: |
        Returns details of a specific user by ID. 
        Requires authentication.
      operationId: getUser
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details
          content:
            application/vnd.mason+json:
              example:
                {
                  "id": 1,
                  "name": "Alice Wonderland",
                  "email": "alice@example.com",
                  "status": "active",
                  "created_at": "2026-04-06T09:47:44.351470",
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/users/1/"},
                    "collection": {"href": "/api/users/"},
                    "profile": {"href": "/api/profiles/user/"},
                    "ticketing:orders": {"href": "/api/users/1/orders/"},
                    "edit": {
                      "href": "/api/users/1/",
                      "method": "PUT",
                      "title": "Edit this user",
                      "schema": {
                        "type": "object",
                        "required": ["name", "email", "password"],
                        "properties": {
                          "name": {"type": "string"},
                          "email": {"type": "string"},
                          "password": {"type": "string", "minLength": 6},
                          "status": {"type": "string", "enum": ["active", "disabled"]}
                        }
                      },
                      "encoding": "json"
                    },
                    "ticketing:delete": {
                      "href": "/api/users/1/",
                      "method": "DELETE",
                      "title": "Delete this user"
                    }
                  }
                }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "User not found"
    
    put:
      summary: Update a user
      description: |
        Update details of a specific user by ID. 
        Requires authentication.
      operationId: updateUser
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
            example:
              name: "John Doe Updated"
              email: "john.updated@example.com"
              "password": "newpassword456"
      responses:
        '204':
          description: User updated
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "User not found"
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Email already exists"
        '415':
          description: Unsupported media type - JSON required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unsupported Media Type"
                message: "Content-Type must be application/json"

    delete:
      summary: Delete a user
      description: |
        Delete a specific user by ID. Requires authentication.
      operationId: deleteUser
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '204':
          description: User deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "User not found"

  /users/{user_id}/orders:
    parameters:
      - $ref: '#/components/parameters/user_id'

    get:
      summary: Get all orders for a user
      description: |
        Returns a list of all orders for a specific user by ID. 
        Requires authentication.
      operationId: getUserOrders
      tags:
        - Users
        - Orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user's orders
          content:
            application/vnd.mason+json:
              example:
                {
                  "items": [
                    {
                      "id": 1,
                      "user_id": 1,
                      "ticket_id": 1,
                      "status": "not_used",
                      "created_at": "2026-04-06T10:00:00.000000",
                      "@controls": {
                        "self": {"href": "/api/orders/1/"}
                      }
                    }
                  ],
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/users/1/orders/"}
                  }
                }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '403':
          description: Forbidden - Cannot view other user's orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Forbidden"
                message: "Cannot view other user's orders"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "User not found"

  /events/:
    get:
      summary: Get all events
      description: |
        Returns a list of all events.
        Each event item includes hypermedia controls.
      operationId: getEvents
      tags:
        - Events
      responses:
        '200':
          description: List of all events
          content:
            application/vnd.mason+json:
              example:
                {
                  "items": [
                    {
                      "id": 1,
                      "title": "Summer Concert",
                      "venue": "Central Park Arena",
                      "city": "Helsinki",
                      "description": "A great summer concert",
                      "starts_at": "2026-05-06T12:47:45.050401",
                      "ends_at": null,
                      "status": "active",
                      "tickets": [
                        {"id": 1, "name": "Standard", "price": 25.0, "capacity": 100, "remaining": 100},
                        {"id": 2, "name": "VIP", "price": 50.0, "capacity": 20, "remaining": 20}
                      ],
                      "@controls": {
                        "self": {"href": "/api/events/1/"},
                        "profile": {"href": "/api/profiles/event/"},
                        "ticketing:tickets": {"href": "/api/events/1/tickets/"}
                      }
                    }
                  ],
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/events/"},
                    "ticketing:add-event": {
                      "href": "/api/events/",
                      "method": "POST",
                      "title": "Create new event",
                      "schema": {
                        "type": "object",
                        "required": ["title", "venue", "city", "starts_at"],
                        "properties": {
                          "title": {"type": "string"},
                          "venue": {"type": "string"},
                          "city": {"type": "string"},
                          "description": {"type": "string"},
                          "starts_at": {"type": "string", "format": "date-time"},
                          "ends_at": {"type": ["string", "null"], "format": "date-time"},
                          "status": {"type": "string", "enum": ["active", "cancelled"]}
                        }
                      },
                      "encoding": "json"
                    }
                  }
                }

    post:
      summary: Create a new event
      description: |
        Create a new event. Requires authentication.
      operationId: createEvent
      tags:
        - Events
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
            example:
              {
                "title": "New Concert",
                "venue": "Test Venue",
                "city": "Helsinki",
                "starts_at": "2026-06-01T18:00:00"
              }
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                title: "New Concert"
                venue: "Test Venue"
                city: "Helsinki"
                description: null
                starts_at: "2026-06-01T18:00:00Z"
                ends_at: null
                status: "active"
          headers:
            Location:
              schema:
                type: string
              description: URL of the created event
              example: "/api/events/3"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '409':
          description: Event conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Event time conflicts with an existing event"
        '415':
          description: Unsupported media type - JSON required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unsupported Media Type"
                message: "Content-Type must be application/json"

  /events/{event_id}:
    parameters:
      - $ref: '#/components/parameters/event_id'
    
    get:
      summary: Get an event by ID
      description: |
        Returns details of a specific event by ID.
        Each event item includes hypermedia controls.
      operationId: getEvent
      tags:
        - Events
      responses:
        '200':
          description: Event details
          content:
            application/vnd.mason+json:
              example:
                {
                  "id": 1,
                  "title": "Summer Concert",
                  "venue": "Central Park Arena",
                  "city": "Helsinki",
                  "description": "A great summer concert",
                  "starts_at": "2026-05-06T12:47:45.050401",
                  "ends_at": null,
                  "status": "active",
                  "tickets": [
                    {"id": 1, "name": "Standard", "price": 25.0, "capacity": 100, "remaining": 100}
                  ],
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/events/1/"},
                    "collection": {"href": "/api/events/"},
                    "profile": {"href": "/api/profiles/event/"},
                    "ticketing:tickets": {"href": "/api/events/1/tickets/"},
                    "ticketing:add-ticket": {
                      "href": "/api/events/1/tickets/",
                      "method": "POST",
                      "title": "Add ticket to event",
                      "schema": {
                        "type": "object",
                        "required": ["name", "price", "capacity"],
                        "properties": {
                          "name": {"type": "string"},
                          "price": {"type": "number", "minimum": 0},
                          "capacity": {"type": "integer", "minimum": 0}
                        }
                      },
                      "encoding": "json"
                    },
                    "edit": {
                      "href": "/api/events/1/",
                      "method": "PUT",
                      "title": "Edit this event"
                    },
                    "ticketing:delete": {
                      "href": "/api/events/1/",
                      "method": "DELETE",
                      "title": "Delete this event"
                    }
                  }
                }
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Event not found"
    
    put:
      summary: Update an event
      description: |
        Update details of a specific event by ID. 
        Requires authentication.
      operationId: updateEvent
      tags:
        - Events
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Event updated
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Event not found"
        '409':
          description: Cannot update event with existing orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Cannot update event with existing orders"

    delete:
      summary: Delete an event
      description: |
        Delete a specific event by ID. Requires authentication.
        Cannot delete an event if there are existing orders for its tickets.
      operationId: deleteEvent
      tags:
        - Events
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Event deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Event not found"
        '409':
          description: Cannot delete event with existing orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Cannot delete event with existing orders"

  /events/{event_id}/tickets/:
    parameters:
      - $ref: '#/components/parameters/event_id'

    get:
      summary: Get all tickets for an event
      description: |
        Returns a list of all tickets for a specific event by ID.
      operationId: getEventTickets
      tags:
        - Events
        - Tickets
      responses:
        '200':
          description: List of tickets for the event
          content:
            application/vnd.mason+json:
              example:
                {
                  "items": [
                    {
                      "id": 1,
                      "name": "Standard",
                      "price": 25.0,
                      "capacity": 100,
                      "remaining": 100,
                      "@controls": {
                        "self": {"href": "/api/events/1/tickets/1/"},
                        "profile": {"href": "/api/profiles/ticket/"}
                      }
                    }
                  ],
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/events/1/tickets/"},
                    "up": {"href": "/api/events/1/"}
                  }
                }
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Event not found"

    post:
      summary: Create a ticket for an event
      description: |
        Create a new ticket for a specific event by ID. 
        Requires authentication.
      operationId: createTicket
      tags:
        - Events
        - Tickets
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ticket'
            example:
              name: "Early Bird"
              price: 75.00
              capacity: 200
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
              example:
                name: "Early Bird"
                price: 75.00
                capacity: 200
          headers:
            Location:
              schema:
                type: string
              description: URL of the created ticket
              example: "/api/events/1/tickets/3"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '409':
          description: Ticket name must be unique per event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Ticket name must be unique per event"

  /events/{event_id}/tickets/{ticket_id}:
    parameters:
      - $ref: '#/components/parameters/event_id'
      - $ref: '#/components/parameters/ticket_id'

    get:
      summary: Get a ticket by ID
      description: |
        Returns details of a specific ticket by ID for a specific event by ID.
      operationId: getTicket
      tags:
        - Tickets
      responses:
        '200':
          description: Ticket details
          content:
            application/vnd.mason+json:
              example:
                {
                  "id": 1,
                  "name": "Standard",
                  "price": 25.0,
                  "capacity": 100,
                  "remaining": 50,
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/events/1/tickets/1/"},
                    "collection": {"href": "/api/events/1/tickets/"},
                    "profile": {"href": "/api/profiles/ticket/"},
                    "up": {"href": "/api/events/1/"}
                  }
                }
        '404':
          description: Ticket or event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Ticket or event not found"

    delete:
      summary: Delete a ticket
      description: |
        Delete a specific ticket by ID for a specific event by ID. 
        Requires authentication. Cannot delete a ticket if there are existing orders for it.
      operationId: deleteTicket
      tags:
        - Tickets
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Ticket deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: Ticket or event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Ticket or event not found"
        '409':
          description: Cannot delete ticket with existing orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Cannot delete ticket with existing orders"

  /orders/:
    get:
      summary: Get all orders
      description: |
        Returns a list of all orders. Requires authentication.
        Each order item includes hypermedia controls.
      operationId: getOrders
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of all orders
          content:
            application/vnd.mason+json:
              example:
                {
                  "items": [
                    {
                      "id": 1,
                      "user_id": 1,
                      "ticket_id": 1,
                      "status": "not_used",
                      "created_at": "2026-04-06T10:00:00.000000",
                      "@controls": {
                        "self": {"href": "/api/orders/1/"}
                      }
                    }
                  ],
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/orders/"},
                    "ticketing:buy": {
                      "href": "/api/orders/",
                      "method": "POST",
                      "title": "Buy ticket",
                      "schema": {
                        "type": "object",
                        "required": ["ticket_id"],
                        "properties": {
                          "ticket_id": {"type": "integer"}
                        }
                      },
                      "encoding": "json"
                    }
                  }
                }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
    
    post:
      summary: Create a new order
      description: |
        Create a new order (buy a ticket). Requires authentication.
      operationId: createOrder
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
            example:
              ticket_id: 1
      responses:
        '201':
          description: Order created
          content:
            application/vnd.mason+json:
              example:
                {
                  "message": "Order created successfully",
                  "order_id": 1
                }
          headers:
            Location:
              schema:
                type: string
              description: URL of the created order
              example: "/api/orders/3"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Bad Request"
                message: "Invalid request body"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '404':
          description: User or ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "User or ticket not found"
        '409':
          description: Ticket sold out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Ticket sold out"

  /orders/{order_id}:
    parameters:
      - $ref: '#/components/parameters/order_id'

    get:
      summary: Get an order by ID
      description: |
        Returns details of a specific order by ID. Requires authentication.
      operationId: getOrder
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order details
          content:
            application/vnd.mason+json:
              example:
                {
                  "id": 1,
                  "user_id": 1,
                  "ticket_id": 1,
                  "status": "not_used",
                  "created_at": "2026-04-06T10:00:00.000000",
                  "@namespaces": {
                    "ticketing": {"name": "/api/link-relations#"}
                  },
                  "@controls": {
                    "self": {"href": "/api/orders/1/"},
                    "collection": {"href": "/api/orders/"},
                    "profile": {"href": "/api/profiles/order/"},
                    "ticketing:ticket": {"href": "/api/events/1/tickets/1/"},
                    "ticketing:cancel": {
                      "href": "/api/orders/1/",
                      "method": "DELETE",
                      "title": "Cancel this order"
                    }
                  }
                }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '403':
          description: Forbidden - Cannot view other user's order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Forbidden"
                message: "Cannot view other user's order"
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Order not found"
    
    delete:
      summary: Delete an order
      description: |
        Delete a specific order by ID (cancel the order). Requires authentication.
        Cannot delete an order if it has already been used.
      operationId: deleteOrder
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Order cancelled
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Authentication required"
        '403':
          description: Forbidden - Cannot delete other user's order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Forbidden"
                message: "Cannot delete other user's order"
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "Order not found"
        '409':
          description: Could not delete order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Conflict"
                message: "Could not delete order"

